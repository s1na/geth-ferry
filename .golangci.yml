# Conservative linter set: builtin go vet, plus a handful of widely-accepted
# linters. Resist the urge to add stylistic linters that produce churn
# without catching bugs.

run:
  timeout: 5m

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - misspell

linters-settings:
  errcheck:
    # Ignored on purpose: defer Close() on read-only streams, best-effort
    # cleanup in abort paths.
    exclude-functions:
      - (io.Closer).Close
      - (*os.File).Close
      - fmt.Fprintln
      - fmt.Fprintf
      - fmt.Fprint

issues:
  exclude-rules:
    # Test files often use _ = … for clarity on best-effort calls.
    - path: _test\.go
      linters:
        - errcheck
